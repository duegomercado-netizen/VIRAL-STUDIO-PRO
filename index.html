    // ==================== MULTI-API ENGINE (GRATIS) ====================
    // Rotación automática entre APIs gratuitas para evitar rate limits
    const API_PROVIDERS = [
      {
        name: "Pollinations AI",
        url: (prompt) => `https://text.pollinations.ai/${encodeURIComponent(prompt)}?model=openai&seed=${Date.now()}`,
        method: "GET",
        headers: {},
        parse: (text) => text,
        cooldown: 0,
      },

        name: "Ollama Local",
        url: "http://localhost:11434/api/generate",
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: (prompt) => JSON.stringify({ model: "llama2", prompt, stream: false }),
        parse: (data) => data.response,
        cooldown: 0,
      }
    ];

    let currentProvider = 0;
    let lastCallTime = 0;

    async function smartAI(prompt, maxTokens = 1400) {
      const now = Date.now();
      const timeSinceLastCall = now - lastCallTime;
      if (timeSinceLastCall < 2000) {
        await new Promise(r => setTimeout(r, 2000 - timeSinceLastCall));
      }
      lastCallTime = Date.now();

      // Intentar cada proveedor en orden
      for (let attempts = 0; attempts < API_PROVIDERS.length * 2; attempts++) {
        const provider = API_PROVIDERS[currentProvider];
        try {
          const options = {
            method: provider.method,
            headers: provider.headers,
          };
          if (provider.method === "POST" && provider.body) {
            options.body = provider.body(prompt);
          }
          const response = await fetch(
            typeof provider.url === "function" ? provider.url(prompt) : provider.url,
            options
          );
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          const data = provider.method === "GET" ? await response.text() : await response.json();
          const result = provider.parse(data);
          if (result && result.length > 50) return result;
          throw new Error("Respuesta vacía");
        } catch (e) {
          console.log(`❌ ${provider.name} falló:`, e.message);
          currentProvider = (currentProvider + 1) % API_PROVIDERS.length;
          await new Promise(r => setTimeout(r, 1000));
        }
      }
      throw new Error("Todos los proveedores fallaron");
    }

        clearInterval(pctRef.current.t);

        setState("loading"); setErr(""); setRl(false);

            return (
              <div style={{padding:"16px",maxWidth:480,margin:"0 auto"}}>
                {step===1 && <S1_Config onNext={(c) => {setCfg(c); setStep(2);}} />}
                {step===2 && <S2_Investigate cfg={cfg} onNext={(r) => {setResearch(r); setStep(3);}} onBack={() => setStep(1)} />}
                {step===3 && <S3_Hook cfg={cfg} research={research} onNext={(g) => {setGancho(g); setStep(4);}} onBack={() => setStep(2)} />}
                {step===4 && <S4_Generate cfg={cfg} research={research} gancho={gancho} onNext={(c) => {setContent(c); setStep(5); saveToHistory({tema: cfg.tema, fecha: new Date().toLocaleDateString(), research, gancho: g.texto});}} onBack={() => setStep(3)} />}
                {step===5 && <S5_Result cfg={cfg} research={research} gancho={gancho} content={content} onRestart={() => {setStep(1); setCfg(null); setResearch(null); setGancho(null); setContent(null);}} />}
              </div>
            );
          case "autovideo":
            return <div style={{padding:"16px",maxWidth:480,margin:"0 auto"}}>
              <div className="animate-up">
                <h2 style={{color:C.text,fontSize:20,fontWeight:900,marginBottom:16}}>🎬 Auto-Video</h2>
                <Card glow={C.pink} style={{marginBottom:16}}>
                  <div style={{color:C.pink,fontWeight:800,fontSize:14,marginBottom:8}}>Próximamente</div>
                  <div style={{color:C.sub,fontSize:12,lineHeight:1.6}}>La función Auto-Video estará disponible muy pronto. Podrás pegar tu guion y recibir un pack completo de producción.</div>
                </Card>
                <Btn full onClick={() => setScreen("welcome")} variant="ghost">← Volver al inicio</Btn>
              </div>
            </div>;
          case "history":
            return <div style={{padding:"16px",maxWidth:480,margin:"0 auto"}}>
              <div className="animate-up">
                <h2 style={{color:C.text,fontSize:20,fontWeight:900,marginBottom:16}}>📂 Historial</h2>
                {history.length===0 ? (
                  <Card style={{textAlign:"center",padding:24}}>
                    <div style={{fontSize:32,marginBottom:8}}>📭</div>
                    <div style={{color:C.sub,fontSize:13}}>No tenés videos guardados todavía</div>
                  </Card>
                ) : (
                  history.map((h,i) => (
                    <Card key={i} style={{marginBottom:10}}>
                      <div style={{color:C.text,fontWeight:700,fontSize:13}}>{h.tema || "Video sin título"}</div>
                      <div style={{color:C.muted,fontSize:11,marginTop:4}}>{h.fecha}</div>
                      <div style={{marginTop:6,display:"flex",gap:6}}>
                        <Tag color={C.purple}>⭐ {h.research?.viralScore}</Tag>
                        <Tag color={C.gold}>{h.gancho}</Tag>
                      </div>
                    </Card>
                  ))
                )}
                <Btn full onClick={() => setScreen("welcome")} variant="ghost" style={{marginTop:16}}>← Volver al inicio</Btn>
              </div>
            </div>;
          default:
            return null;
        }
      }

      return (
        <div style={{minHeight:"100vh",background:C.bg}}>
          {screen !== "boot" && (
            <div style={{position:"sticky",top:0,zIndex:100,background:`${C.bg}ee`,backdropFilter:"blur(10px)",borderBottom:`1px solid ${C.border}`}}>
              <div style={{maxWidth:480,margin:"0 auto",padding:"12px 16px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                <div style={{fontWeight:900,fontSize:16,color:C.text}}>
                  <span style={{color:"#fff"}}>Viral</span><span style={{color:C.purple}}>Studio</span>
                </div>
                <div style={{display:"flex",gap:8}}>
                  {screen==="wizard" && <span style={{color:C.muted,fontSize:11}}>Paso {step}/5</span>}
                  <button onClick={() => setScreen("welcome")} style={{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:18}}>🏠</button>
                </div>
              </div>
            </div>
          )}
          <div style={{maxWidth:480,margin:"0 auto"}}>
            {renderScreen()}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
