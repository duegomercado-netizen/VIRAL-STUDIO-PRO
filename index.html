<!DOCTYPE html>
<html lang="es">
<head>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: #07070f; color: #f0efff; overflow-x: hidden; -webkit-font-smoothing: antialiased; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #0d0d1c; }
    ::-webkit-scrollbar-thumb { background: #1a1a35; border-radius: 4px; }
    input, textarea, select, button { font-family: inherit; }
    input:focus, textarea:focus, select:focus { outline: none; }
    @keyframes up { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    @keyframes glow { 0%, 100% { text-shadow: 0 0 8px #00e676; } 50% { text-shadow: 0 0 24px #00e676, 0 0 40px #00e676; } }
    @keyframes bootbar { from { width: 0; } to { width: 100%; } }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
    @keyframes tooltipFade { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    .animate-up { animation: up 0.4s both; }
    .animate-pulse { animation: pulse 1s infinite; }
    .animate-glow { animation: glow 1.5s ease infinite; }
    .animate-float { animation: float 3s ease infinite; }
    button, a, [role="button"] { touch-action: manipulation; }
    input[type="range"] { -webkit-appearance: none; appearance: none; height: 4px; border-radius: 2px; background: #1a1a35; }
    input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 16px; height: 16px; border-radius: 50%; background: #f59e0b; cursor: pointer; box-shadow: 0 0 8px rgba(245, 158, 11, 0.5); }
    
    .tooltip-container { position: relative; display: inline-block; }
    .tooltip-text {
      visibility: hidden;
      position: absolute;
      bottom: 125%;
      left: 50%;
      transform: translateX(-50%);
      background: #1a1a35;
      color: #f0efff;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 11px;
      white-space: nowrap;
      z-index: 1000;
      border: 1px solid #7c3aed;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      max-width: 200px;
      white-space: normal;
      text-align: center;
      line-height: 1.4;
    }
    .tooltip-text::after {
      content: "";
      position: absolute;
      top: 100%;
      left: 50%;
      margin-left: -5px;
      border-width: 5px;
      border-style: solid;
      border-color: #7c3aed transparent transparent transparent;
    }
    .tooltip-container:hover .tooltip-text,
    .tooltip-container:active .tooltip-text {
      visibility: visible;
      opacity: 1;
      animation: tooltipFade 0.3s ease;
    }
    
    .chat-bubble {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: linear-gradient(135deg, #7c3aed, #5b21b6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(124, 58, 237, 0.4);
      z-index: 999;
      transition: transform 0.2s;
    }
    .chat-bubble:active { transform: scale(0.95); }
    .chat-window {
      position: fixed;
      bottom: 85px;
      right: 20px;
      width: calc(100vw - 40px);
      max-width: 360px;
      height: 500px;
      background: #111124;
      border: 1px solid #1a1a35;
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      z-index: 998;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .chat-message {
      max-width: 85%;
      padding: 10px 14px;
      border-radius: 14px;
      font-size: 13px;
      line-height: 1.5;
    }
    .chat-message.user {
      align-self: flex-end;
      background: #7c3aed;
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .chat-message.bot {
      align-self: flex-start;
      background: #0d0d1c;
      color: #f0efff;
      border: 1px solid #1a1a35;
      border-bottom-left-radius: 4px;
    }
    .chat-input-area {
      padding: 12px;
      border-top: 1px solid #1a1a35;
      display: flex;
      gap: 8px;
    }
    .chat-input {
      flex: 1;
      background: #0d0d1c;
      border: 1px solid #1a1a35;
      border-radius: 10px;
      padding: 10px 14px;
      color: #f0efff;
      font-size: 13px;
    }
    .chat-send {
      background: #7c3aed;
      border: none;
      border-radius: 10px;
      padding: 10px 16px;
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      font-size: 12px;
    }
  </style>
</head>

cion":"asombro","porQueJala":"Empatía heroica: conecta emocionalmente con el sacrificio. El viewer se siente cómplice de algo exclusivo sobre ${tema}."}]}`;

    // ==================== PLAN MANAGER ====================
    function getUserPlan() {
      const planData = storageGet("vs_plan");
      if (!planData) return { type: "free", startDate: Date.now(), videosUsed: 0, maxVideos: 2, expiresAt: Date.now() + (3 * 24 * 60 * 60 * 1000) };
      return JSON.parse(planData);
    }

    function setUserPlan(planType) {
      const plan = ADMIN_CONFIG.plans[planType];
      storageSet("vs_plan", JSON.stringify({
        type: planType,
        startDate: Date.now(),
        videosUsed: 0,
        maxVideos: plan.maxVideos,
        expiresAt: Date.now() + (plan.days * 24 * 60 * 60 * 1000)
      }));
    }

    function checkPlanAccess() {
      const plan = getUserPlan();
      const now = Date.now();
      if (now > plan.expiresAt) {
        return { allowed: false, reason: "expired", message: "Tu prueba expiró. Elegí un plan para continuar." };
      }
      if (plan.videosUsed >= plan.maxVideos) {
        return { allowed: false, reason: "limit", message: "Llegaste al límite de videos. Actualizá tu plan." };
      }
      return { allowed: true, remaining: plan.maxVideos - plan.videosUsed, expiresIn: Math.ceil((plan.expiresAt - now) / (24 * 60 * 60 * 1000)) };
    }

    function useVideo() {
      const plan = getUserPlan();
      plan.videosUsed++;
      storageSet("vs_plan", JSON.stringify(plan));
    }

    function Btn({children, onClick, disabled, full, variant="primary", small, tooltip}) {
      const V = {

        ghost:{background:"transparent",color:C.sub,border:`1px solid ${C.border}`},

        pink:{background:`linear-gradient(135deg,${C.pink},#be185d)`,color:"#fff",border:"none"},
      };
      const button = (
        <button onClick={!disabled?onClick:undefined} style={{...V[variant],borderRadius:10,cursor:disabled?"not-allowed":"pointer",padding:small?"7px 14px":"12px 18px",fontWeight:700,fontSize:small?12:14,width:full?"100%":"auto",transition:"all .15s",opacity:disabled?.5:1,fontFamily:"inherit",letterSpacing:.3}}>

      );
      return tooltip ? <Tooltip text={tooltip}>{button}</Tooltip> : button;
    }

    function CopyBtn({text, label, id, copied, onCopy}) {
      const done = copied===id;
      return (
        <button onClick={()=>onCopy(text,id)} style={{background:done?"#052e16":"transparent",border:`1px solid ${done?C.neon:C.border}`,color:done?C.neon:C.muted,padding:"4px 10px",fontSize:10,cursor:"pointer",borderRadius:6,transition:"all .2s",fontFamily:"inherit",fontWeight:700,letterSpacing:.5}}>

    // ==================== CHAT ASSISTANT ====================
    function ChatAssistant({visible, onClose}) {
      const [messages, setMessages] = useState([
        {type:"bot", text:"¡Hola! Soy tu asistente de ViralStudio. Preguntame lo que necesites sobre la app, cómo crear videos virales, o cualquier duda que tengas. Estoy para ayudarte 24/7."}
      ]);
      const [input, setInput] = useState("");
      const [loading, setLoading] = useState(false);
      const messagesEndRef = useRef(null);

      useEffect(() => {
        messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
      }, [messages]);

      async function sendMessage() {
        if (!input.trim() || loading) return;

    function IncomeCalculator({cpmRange, region, dur}) {
      const [views, setViews] = useState(100000);
      const cpmLow = parseInt(cpmRange?.split("–")[0]?.replace("$","")) || 5;
      const cpmHigh = parseInt(cpmRange?.split("–")[1]?.replace("$","")) || cpmLow * 2;
      const regionMult = { "EE.UU.": 2.5, "España": 1.8, "UK": 2.2, "Canadá": 2.0, "Australia": 1.9, "Mundial": 1.3, "Latinoamérica": 0.6, "México": 0.7, "Argentina": 0.5, "Brasil": 0.6 }[region] || 1;
      const low = Math.round((views / 1000) * cpmLow * regionMult);
      const high = Math.round((views / 1000) * cpmHigh * regionMult);
      
      return (
        <Card glow={C.gold} style={{marginBottom:14}}>
          <div style={{color:C.gold,fontWeight:800,fontSize:13,marginBottom:10}}>💰 Calculadora de Ingresos</div>
          <div style={{marginBottom:12}}>
            <div style={{color:C.muted,fontSize:10,marginBottom:4}}>Vistas estimadas: {(views/1000).toFixed(0)}K</div>
            <input type="range" min="10000" max="10000000" step="10000" value={views} onChange={e=>setViews(Number(e.target.value))} style={{width:"100%"}}/>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
            <div style={{background:C.surface,borderRadius:8,padding:10,textAlign:"center"}}>
              <div style={{color:C.muted,fontSize:10}}>Conservador</div>
              <div style={{color:C.green,fontWeight:900,fontSize:20}}>${low.toLocaleString()}</div>
            </div>
            <div style={{background:C.surface,borderRadius:8,padding:10,textAlign:"center"}}>
              <div style={{color:C.muted,fontSize:10}}>Optimista</div>
              <div style={{color:C.gold,fontWeight:900,fontSize:20}}>${high.toLocaleString()}</div>
            </div>
          </div>
          <div style={{color:C.sub,fontSize:11,lineHeight:1.5}}>📊 Región: {region} (×{regionMult})<br/>💡 Cambiá a EE.UU. para ganar {Math.round(2.5/regionMult*10)/10}x más</div>
        </Card>
      );
    }
