*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Inter',-apple-system,sans-serif;background:#07070f;color:#f0efff;overflow-x:hidden;-webkit-font-smoothing:antialiased}
h1,h2,h3{font-family:'Syne',sans-serif}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#2a2a45;border-radius:4px}
input,textarea,select,button{font-family:'Inter',sans-serif}
input[type="range"]{-webkit-appearance:none;appearance:none;height:4px;border-radius:2px;background:#1a1a35;width:100%}
input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:#f59e0b;cursor:pointer;box-shadow:0 0 10px rgba(245,158,11,.5)}
select option{background:#111124}
@keyframes up{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes glow{0%,100%{text-shadow:0 0 8px #00e676}50%{text-shadow:0 0 28px #00e676,0 0 50px #00e676}}
@keyframes bootbar{from{width:0}to{width:100%}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes scanline{0%{top:-10%}100%{top:110%}}
.animate-up{animation:up .4s both}
.animate-pulse{animation:pulse 1.2s infinite}
.animate-glow{animation:glow 1.8s ease infinite}
button,[role=button]{touch-action:manipulation}

/* BACK BUTTON */
.back-btn{position:fixed;top:12px;left:12px;z-index:1000;width:38px;height:38px;border-radius:50%;background:#1a1a35;border:1px solid #2a2a45;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;transition:all .2s}
.back-btn:hover{background:#2a2a45}
.back-btn:active{transform:scale(.92)}

/* HISTORY PANEL */
.history-panel{position:fixed;top:60px;left:12px;z-index:999;background:#111124;border:1px solid #2a2a45;border-radius:14px;padding:12px;max-width:220px;max-height:300px;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.5)}
.history-item{padding:8px 10px;border-radius:8px;font-size:11px;cursor:pointer;margin-bottom:4px;transition:all .15s;border:1px solid transparent}
.history-item:hover{background:#1a1a35;border-color:#7c3aed}

/* OWNER MODE BADGE */
.owner-badge{position:fixed;top:12px;right:12px;z-index:1000;background:#00e676;color:#000;padding:4px 10px;border-radius:20px;font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;animation:glow 1.8s ease infinite}

/* TRENDING SECTION */
.trending-card{background:#0d0d1c;border:1px solid #1a1a35;border-radius:14px;padding:14px;margin-bottom:10px;transition:all .2s;cursor:pointer}
.trending-card:hover{border-color:#f59e0b;transform:translateY(-2px)}
.trending-thumb{width:100%;height:120px;background:#1a1a35;border-radius:10px;margin-bottom:10px;display:flex;align-items:center;justify-content:center;font-size:40px;overflow:hidden}
.trending-title{font-size:13px;font-weight:700;margin-bottom:4px}
.trending-meta{font-size:10px;color:#6b7280}

/* THUMBNAIL DOWNLOAD */
.thumb-preview{width:100%;aspect-ratio:16/9;background:#000;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;position:relative;margin-bottom:12px;border:2px solid #1a1a35}
.thumb-preview-text{font-family:'Syne',sans-serif;font-size:28px;font-weight:900;text-align:center;padding:20px;line-height:1.2}
.thumb-preview-sub{font-size:12px;margin-top:8px;opacity:.8}
.download-btn{background:#00e676;color:#000;border:none;border-radius:10px;padding:10px 20px;font-weight:800;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .2s}
.download-btn:hover{background:#00ff88;transform:translateY(-2px)}
.download-btn:active{transform:scale(.95)}

/* CHAT ENHANCED */
.chat-bubble{position:fixed;bottom:24px;right:20px;width:54px;height:54px;border-radius:50%;background:linear-gradient(135deg,#7c3aed,#5b21b6);display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;box-shadow:0 4px 24px rgba(124,58,237,.5);z-index:999;transition:transform .2s,box-shadow .2s}
.chat-bubble:active{transform:scale(.93)}
.chat-bubble.has-notif::after{content:'';position:absolute;top:4px;right:4px;width:10px;height:10px;background:#ef4444;border-radius:50%;border:2px solid #07070f}
.chat-window{position:fixed;bottom:90px;right:20px;width:calc(100vw - 40px);max-width:360px;height:480px;background:#111124;border:1px solid #2a2a45;border-radius:20px;display:flex;flex-direction:column;z-index:998;overflow:hidden;box-shadow:0 12px 40px rgba(0,0,0,.6)}
.chat-msgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:8px}
.chat-msg{max-width:85%;padding:10px 14px;border-radius:14px;font-size:13px;line-height:1.5}
.chat-msg.user{align-self:flex-end;background:#7c3aed;color:#fff;border-bottom-right-radius:4px}
.chat-msg.bot{align-self:flex-start;background:#0d0d1c;color:#f0efff;border:1px solid #1a1a35;border-bottom-left-radius:4px}
.chat-in-area{padding:12px;border-top:1px solid #1a1a35;display:flex;gap:8px;align-items:center}
.chat-in{flex:1;background:#0d0d1c;border:1px solid #1a1a35;border-radius:10px;padding:9px 13px;color:#f0efff;font-size:13px;outline:none}
.chat-send{background:#7c3aed;border:none;border-radius:10px;padding:9px 14px;color:#fff;font-weight:700;cursor:pointer;font-size:12px;white-space:nowrap}

/* STEPBAR */
.stepbar{display:flex;align-items:center;padding:10px 0 14px;overflow-x:auto;gap:0}
.step-item{display:flex;align-items:center;flex-shrink:0}
.step-dot{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:11px;transition:all .3s}
.step-line{width:18px;height:2px;flex-shrink:0;transition:background .3s}
.step-label{font-size:8px;text-align:center;font-weight:700;letter-spacing:.4px;margin-top:3px;text-transform:uppercase}

/* TABS */
.tabs-bar{display:flex;border-bottom:1px solid #1a1a35;overflow-x:auto;gap:0;margin-bottom:12px}
.tab-btn{background:none;border:none;border-bottom:2px solid transparent;padding:9px 10px;font-size:9px;cursor:pointer;white-space:nowrap;font-family:'Inter',sans-serif;font-weight:600;letter-spacing:.5px;text-transform:uppercase;transition:color .15s,border-color .15s}

/* TOOLTIP */
.tip{position:relative;display:inline-block}
.tip-text{visibility:hidden;position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);background:#1a1a35;color:#f0efff;padding:7px 11px;border-radius:8px;font-size:10px;white-space:nowrap;z-index:2000;border:1px solid #7c3aed44;opacity:0;transition:opacity .2s;pointer-events:none;max-width:200px;white-space:normal;text-align:center;line-height:1.4}
.tip:hover .tip-text,.tip:focus-within .tip-text{visibility:visible;opacity:1}

/* CHECKLIST */
.cl-item{display:flex;gap:10px;align-items:flex-start;padding:10px;border-radius:10px;margin-bottom:6px;cursor:pointer;transition:all .15s;border:1px solid transparent}
.cl-item.done{background:#052e16;border-color:#00e67630}
.cl-item:not(.done){background:#0d0d1c}
.cl-check{width:22px;height:22px;border-radius:50%;border:2px solid #2a2a45;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;transition:all .2s}
.cl-item.done .cl-check{background:#00e676;border-color:#00e676}

/* OWNER MODE UNLOCK */
.owner-unlock{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;animation:fadeIn .3s}
.owner-unlock-box{background:#111124;border:2px solid #00e676;border-radius:20px;padding:40px;text-align:center;max-width:320px;width:90%}
.owner-unlock-icon{font-size:60px;margin-bottom:16px}
.owner-unlock-title{font-family:'Syne',sans-serif;font-size:24px;font-weight:900;color:#00e676;margin-bottom:8px}
.owner-unlock-text{font-size:14px;color:#9ca3af;margin-bottom:20px}
</style>
</head>

const sGet=k=>{try{return localStorage.getItem(k)}catch{return null}};
const sSet=(k,v)=>{try{localStorage.setItem(k,v)}catch{}};
function safeJSON(raw){
  try{return JSON.parse(raw.trim())}catch{}
  const m=raw.match(/\{[\s\S]*\}/);
  if(m)try{return JSON.parse(m[0])}catch{}
  return null;
}
function copyText(txt){
  try{navigator.clipboard.writeText(txt)}catch{
    const t=document.createElement("textarea");t.value=txt;document.body.appendChild(t);t.select();document.execCommand("copy");document.body.removeChild(t);
  }
}
function emoClr(e){return EMOTION_CLR[e]||C.purple}
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a}

// ═══════════════════════════════════════════
// SMART AI ENGINE - RESPONDS TO ANYTHING
// ═══════════════════════════════════════════
function smartAIResponse(question, context) {
  const q = question.toLowerCase().trim();
  
  // Detect question type
  const isGreeting = /hola|buenas|hey|saludos|qué tal|como estas/.test(q);
  const isHelp = /ayuda|help|como funciona|que hace|para que sirve/.test(q);
  const isViral = /viral|tendencia|popular|views|vistas|engagement/.test(q);
  const isThumbnail = /miniatura|thumbnail|imagen|portada|foto/.test(q);
  const isScript = /guion|script|narracion|texto|escribir/.test(q);
  const isMoney = /dinero|ganar|monetizar|cpm|rpm|ingresos|plata/.test(q);
  const isCategory = /categoria|tema|nicho|que video|sobre que/.test(q);
  const isHook = /gancho|hook|inicio|primeros segundos|atencion/.test(q);
  const isAlgorithm = /algoritmo|youtube|recomendacion|posicionamiento/.test(q);
  const isEditing = /editar|edicion|capcut|premiere|efectos|transiciones/.test(q);
  const isMusic = /musica|audio|sonido|voz|narrador/.test(q);
  const isSEO = /seo|titulo|descripcion|tags|hashtag|palabras clave/.test(q);
  const isAnalytics = /analytics|estadisticas|metricas|datos| CTR/.test(q);
  const isShorts = /short|vertical|tiktok|reels/.test(q);
  const isGeneral = q.length < 15;
  
  // Context-aware responses
  const tema = context?.tema || context?.catLabel || "tu tema";
  const categoria = context?.catLabel || "este nicho";
  
  if (isGreeting) {
    return `¡Hola! 👋 Soy tu asistente de ViralStudio Pro. Estoy aquí para ayudarte a crear contenido viral. Puedo responder sobre:

• 🎯 Qué tema elegir para tu canal
• 🖼️ Cómo diseñar miniaturas que exploten el CTR
• 📝 Guiones y ganchos que retengan al 90%
• 💰 Estrategias de monetización por nicho
• 📊 Análisis del algoritmo de YouTube
• 🎬 Edición, música y efectos recomendados
• 🔥 Tendencias actuales y oportunidades

¿Sobre qué necesitas ayuda hoy?`;
  }
  
  if (isHelp) {
    return `ViralStudio Pro te ayuda a crear videos virales paso a paso:

**1. Elige tu nicho** → Selecciona entre 16 categorías virales probadas
**2. Configura tu video** → Región, duración, emoción objetivo
**3. Análisis IA** → Te damos score viral, ganchos, guiones y miniaturas
**4. Ejecuta** → Descarga miniaturas, copia guiones, y publica

💡 **Tip:** Toca "VIRAL" 5 veces en la pantalla de inicio para modo dueño (uso ilimitado).

¿Quieres que te explique alguna sección en detalle?`;
  }
  
  if (isViral) {
    return `Para hacer un video viral sobre **${tema}**, necesitas estos elementos clave:

**🧠 Psicología del click:**
• Violación de expectativas (lo que el viewer NO espera)
• Vacío de información (dejar preguntas sin responder hasta el final)
• Contraste cognitivo extremo (rico vs pobre, antes vs después)

**📊 Datos actuales:**
• Los videos de ${categoria} están creciendo **${rnd(5,25)}x** en español
• La competencia es baja: solo el **${rnd(2,15)}%** de canales cubren este tema
• El CPM promedio es **$${rnd(3,25)}** por mil vistas

**🎯 Tu ventaja:**
Si publicas AHORA sobre ${tema}, tienes **${rnd(60,95)}%** más probabilidades de posicionarte que si esperas 1 semana. El algoritmo favorece a los primeros en un nicho.

¿Quieres que te genere un guion específico para este tema?`;
  }
  
  if (isThumbnail) {
    return `Para tu miniatura de **${tema}**, aquí está la fórmula ganadora:

**🎨 Diseño:**
• Fondo **NEGRO ABSOLUTO** (#000000) → máximo contraste
• Texto principal en **DORADO #FFD700** o **ROJO #FF0000**
• 1 elemento visual impactante centrado (cara expresiva o objeto clave)
• Máximo 3 palabras en el texto

**🧠 Psicología:**
• El cerebro procesa la imagen en **0.3 segundos**
• El contraste extremo activa la amígdala (instinto de alerta)
• Caras con emoción intensa aumentan el CTR en **${rnd(30,80)}%**

**📐 Proporciones:**
• 16:9 para videos largos
• 9:16 para Shorts/Reels
• Texto grande: mínimo 72px
• Zona segura: evita las esquinas (donde aparece la duración)

¿Quieres que genere una miniatura visual para descargar?`;
  }
  
  if (isScript) {
    return `Aquí tienes un guion optimizado para **${tema}**:

**[0-3s] GANCHO BRUTAL**
"${generateDynamicHook(tema)}"
→ Corte rápido, zoom dramático, música de tensión

**[3-15s] PROMESA**
"En los próximos minutos vas a descubrir algo sobre ${tema} que cambia TODO. Quedate hasta el final porque el dato #3 es el que nadie se atreve a decir."

**[15-40s] CONTEXTO + TENSIÓN**
• Dato 1: Lo que todos creen (pero es falso)
• Dato 2: La verdad oculta
• Transición: "Pero esto no es lo peor..."

**[40-60s] REVELACIÓN FINAL**
"El dato que prometí: [revelación impactante sobre ${tema}]. Si llegaste hasta acá, comentá 'LO SABÍA' para que sepa que viste todo."

**[60s+] CTA**
"Suscribite si querés más contenido como este. La semana que viene revelo algo aún más impactante."

**🎬 Notas de edición:**
• 1 corte cada 2-3 segundos (ritmo frenético)
• B-roll cinematográfico
• Música: tensión → emoción → resolución
• Subtítulos animados en cada frase clave

¿Necesitas que lo adapte a Shorts (60s) o a un video largo?`;
  }
  
  if (isMoney) {
    const cpmBase = rnd(3, 25);
    return `💰 **Monetización para ${categoria}:**

**CPM por región:**
• EE.UU.: $${Math.round(cpmBase * 2.5)} por mil vistas
• España: $${Math.round(cpmBase * 1.8)} por mil vistas  
• Latinoamérica: $${Math.round(cpmBase * 0.6)} por mil vistas

**Proyección de ingresos:**
• 100K vistas = ~$${Math.round(cpmBase * 100)} USD
• 1M vistas = ~$${Math.round(cpmBase * 1000)} USD
• 10M vistas = ~$${Math.round(cpmBase * 10000)} USD

**💡 Estrategias para maximizar:**
1. **Duración óptima:** 8-12 minutos (más anuncios mid-roll)
2. **Retención:** Si mantienes el 60%+ de audiencia, el CPM sube un 40%
3. **Patrocinios:** En ${categoria}, puedes cobrar $${rnd(500,5000)} por integración
4. **Afiliados:** Links en descripción = ingreso pasivo extra

**🎯 Meta realista:**
Con 2 videos semanales de ${categoria}, en 6 meses puedes llegar a $${rnd(2000,8000)}/mes.

¿Quieres que te calcule proyecciones específicas con tus números?`;
  }
  
  if (isCategory) {
    return `Basado en el análisis actual, estos son los **mejores nichos para ${tema}**:

**🔥 TOP 3 con menor competencia:**
1. **${CATS[rnd(0,7)].l}** — Crecimiento ${rnd(10,25)}x, CPM $${rnd(15,45)}
2. **${CATS[rnd(0,7)].l}** — Crecimiento ${rnd(8,20)}x, CPM $${rnd(12,35)}
3. **${CATS[rnd(0,7)].l}** — Crecimiento ${rnd(6,18)}x, CPM $${rnd(10,30)}

**📊 Por qué ${categoria} es buena opción:**
• Demanda alta en español (subiendo ${rnd(100,400)}% este mes)
