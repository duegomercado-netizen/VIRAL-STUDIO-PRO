*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Inter',-apple-system,sans-serif;background:#07070f;color:#f0efff;overflow-x:hidden;-webkit-font-smoothing:antialiased}
h1,h2,h3{font-family:'Syne',sans-serif}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#2a2a45;border-radius:4px}
input,textarea,select,button{font-family:'Inter',sans-serif}
input[type="range"]{-webkit-appearance:none;appearance:none;height:4px;border-radius:2px;background:#1a1a35;width:100%}
input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:#f59e0b;cursor:pointer;box-shadow:0 0 10px rgba(245,158,11,.5)}
select option{background:#111124}
@keyframes up{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes glow{0%,100%{text-shadow:0 0 8px #00e676}50%{text-shadow:0 0 28px #00e676,0 0 50px #00e676}}
@keyframes bootbar{from{width:0}to{width:100%}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes scanline{0%{top:-10%}100%{top:110%}}
.animate-up{animation:up .4s both}
.animate-pulse{animation:pulse 1.2s infinite}
.animate-glow{animation:glow 1.8s ease infinite}
button,[role=button]{touch-action:manipulation}

/* CHAT */
.chat-bubble{position:fixed;bottom:24px;right:20px;width:54px;height:54px;border-radius:50%;background:linear-gradient(135deg,#7c3aed,#5b21b6);display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;box-shadow:0 4px 24px rgba(124,58,237,.5);z-index:999;transition:transform .2s,box-shadow .2s}
.chat-bubble:active{transform:scale(.93)}
.chat-bubble.has-notif::after{content:'';position:absolute;top:4px;right:4px;width:10px;height:10px;background:#ef4444;border-radius:50%;border:2px solid #07070f}
.chat-window{position:fixed;bottom:90px;right:20px;width:calc(100vw - 40px);max-width:360px;height:480px;background:#111124;border:1px solid #2a2a45;border-radius:20px;display:flex;flex-direction:column;z-index:998;overflow:hidden;box-shadow:0 12px 40px rgba(0,0,0,.6)}
.chat-msgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:8px}
.chat-msg{max-width:85%;padding:10px 14px;border-radius:14px;font-size:13px;line-height:1.5}
.chat-msg.user{align-self:flex-end;background:#7c3aed;color:#fff;border-bottom-right-radius:4px}
.chat-msg.bot{align-self:flex-start;background:#0d0d1c;color:#f0efff;border:1px solid #1a1a35;border-bottom-left-radius:4px}
.chat-in-area{padding:12px;border-top:1px solid #1a1a35;display:flex;gap:8px;align-items:center}
.chat-in{flex:1;background:#0d0d1c;border:1px solid #1a1a35;border-radius:10px;padding:9px 13px;color:#f0efff;font-size:13px;outline:none}
.chat-send{background:#7c3aed;border:none;border-radius:10px;padding:9px 14px;color:#fff;font-weight:700;cursor:pointer;font-size:12px;white-space:nowrap}

/* STEPBAR */
.stepbar{display:flex;align-items:center;padding:10px 0 14px;overflow-x:auto;gap:0}
.step-item{display:flex;align-items:center;flex-shrink:0}
.step-dot{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:11px;transition:all .3s}
.step-line{width:18px;height:2px;flex-shrink:0;transition:background .3s}
.step-label{font-size:8px;text-align:center;font-weight:700;letter-spacing:.4px;margin-top:3px;text-transform:uppercase}

/* TABS */
.tabs-bar{display:flex;border-bottom:1px solid #1a1a35;overflow-x:auto;gap:0;margin-bottom:12px}
.tab-btn{background:none;border:none;border-bottom:2px solid transparent;padding:9px 10px;font-size:9px;cursor:pointer;white-space:nowrap;font-family:'Inter',sans-serif;font-weight:600;letter-spacing:.5px;text-transform:uppercase;transition:color .15s,border-color .15s}

/* TOOLTIP */
.tip{position:relative;display:inline-block}
.tip-text{visibility:hidden;position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);background:#1a1a35;color:#f0efff;padding:7px 11px;border-radius:8px;font-size:10px;white-space:nowrap;z-index:2000;border:1px solid #7c3aed44;opacity:0;transition:opacity .2s;pointer-events:none;max-width:200px;white-space:normal;text-align:center;line-height:1.4}
.tip:hover .tip-text,.tip:focus-within .tip-text{visibility:visible;opacity:1}

/* CHECKLIST */
.cl-item{display:flex;gap:10px;align-items:flex-start;padding:10px;border-radius:10px;margin-bottom:6px;cursor:pointer;transition:all .15s;border:1px solid transparent}
.cl-item.done{background:#052e16;border-color:#00e67630}
.cl-item:not(.done){background:#0d0d1c}
.cl-check{width:22px;height:22px;border-radius:50%;border:2px solid #2a2a45;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;transition:all .2s}
.cl-item.done .cl-check{background:#00e676;border-color:#00e676}
</style>

async function callAI(prompt,maxTokens=1400){
  try{
    const r=await fetch(`https://text.pollinations.ai/${encodeURIComponent(prompt.slice(0,800))}?model=openai&seed=${Date.now()}`);
    if(r.ok){const t=await r.text();if(t&&t.length>20)return t;}
  }catch{}
  return generateLocal(prompt);
}

const PLANS={
  free:{name:"Prueba",days:3,maxVideos:2},
  basic:{name:"Básico",days:30,maxVideos:10},
  pro:{name:"Pro",days:365,maxVideos:9999},
};
function getPlan(){
  const d=sGet("vs_plan");
  if(!d)return{type:"free",videosUsed:0,maxVideos:2,expiresAt:Date.now()+(3*864e5)};
  return JSON.parse(d);
}
function checkAccess(){
  const p=getPlan();
  if(Date.now()>p.expiresAt)return{ok:false,reason:"expired",msg:"Tu prueba expiró. Elegí un plan para continuar."};
  if(p.videosUsed>=p.maxVideos)return{ok:false,reason:"limit",msg:`Límite de ${p.maxVideos} videos alcanzado. Actualizá tu plan.`};
  const daysLeft=Math.max(1,Math.ceil((p.expiresAt-Date.now())/864e5));
  return{ok:true,remaining:p.maxVideos-p.videosUsed,daysLeft};
}
function consumeVideo(){
  const p=getPlan();p.videosUsed++;sSet("vs_plan",JSON.stringify(p));
}

function ScriptTimer({guion}){
  const [wpm,setWpm]=useState(150);
  if(!guion||guion.length<10)return null;
  const words=guion.split(/\s+/).filter(Boolean).length;
  const mins=(words/wpm);
  const m=Math.floor(mins),s=Math.round((mins-m)*60);
  return(
    <Card style={{marginBottom:14}} accent={C.purple}>
      <div style={{color:C.purpleL,fontWeight:800,fontSize:13,marginBottom:10}}>⏱️ Cronómetro de Narración</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:12}}>
        {[[words,"palabras"],[`${m}m ${s}s`,"duración"],[wpm,"pal/min"]].map(([v,l])=>(
          <div key={l} style={{background:C.surface,borderRadius:8,padding:"8px 10px",textAlign:"center"}}>
            <div style={{color:C.text,fontWeight:900,fontSize:18,lineHeight:1}}>{v}</div>
            <div style={{color:C.muted,fontSize:9,marginTop:3}}>{l}</div>
          </div>
        ))}
      </div>
      <input type="range" min="100" max="220" value={wpm} onChange={e=>setWpm(Number(e.target.value))}/>
      <div style={{color:C.sub,fontSize:11,marginTop:8,lineHeight:1.5}}>
        💡 Documental: 120 pal/min · Conversacional: 150 · Shorts rápido: 190
      </div>
    </Card>
  );
}

function ChatAssistant({visible,onClose}){
  const [msgs,setMsgs]=useState([{t:"bot",txt:"¡Hola! Soy tu asistente de ViralStudio 🤖\n\nPreguntame sobre: ganchos, miniaturas, CPM, guiones, planes, o cualquier duda sobre la app."}]);
  const [input,setInput]=useState("");
  const [loading,setLoading]=useState(false);
  const endRef=useRef(null);
  useEffect(()=>endRef.current?.scrollIntoView({behavior:"smooth"}),[msgs]);

  const knowledgeBase={
    "gancho|hook":["El gancho son los primeros 3 segundos. El cerebro decide en 0.5s si se queda o se va. Elegí el que genere más curiosidad, miedo o sorpresa. La app te muestra la razón neurológica de cada uno.","Los mejores ganchos empiezan con una violación de expectativas ('Lo que nadie sabe...') o una promesa irresistible ('Al final de este video...'). Nunca empieces con 'Hola, bienvenidos'."],
    "miniatura|thumbnail":["La miniatura perfecta: 1) Contraste cognitivo extremo, 2) Máximo 3 palabras en Impact o Bebas, 3) Negro + rojo + dorado. CTR objetivo > 5%.","El 80% de los clicks viene de la miniatura. Si en 48h tu CTR es < 3%, cambiala de inmediato. La app te da instrucciones exactas para recrearla en Canva."],
    "cpm|dinero|ganar|ingreso":["Los mejores nichos: Traiciones ($20-25), Inglés ($18-22), Finanzas ($15-45), Sleep ($16-20). Pero el CPM depende 60% de la región.","EE.UU. y UK pagan 5-10x más que Latinoamérica. Grabá en español neutro y configurá audiencia en EE.UU. y España para maximizar."],
    "guion|script|valley":["El Valle de la Muerte son los primeros 30 segundos. Cambiá plano o sonido cada 3 segundos. Si el viewer llega al segundo 30, hay 70% de chances de que vea el 50% del video.","Guardá tu dato más impactante para el último 10% del video (Dato de Oro). YouTube mide cuántos llegan al 70%, 90% y 100% — más retención = más recomendaciones."],
    "plan|pagar|precio":["Tenés 3 días de prueba con 2 videos. Plan Básico: 10 videos/mes. Plan Pro: ilimitado. Tocá 'Ver Planes' en el inicio para más info.","La prueba incluye todas las funciones. Los planes pagos solo amplían la cantidad de videos que podés generar."],
    "short|tiktok|reels":["Los Shorts: máximo 50 segundos, corte OBLIGATORIO cada 3 segundos, Dato de Oro en los últimos 8 segundos. La app te genera 3 scripts listos.","TikTok y Reels funcionan con el mismo formato. Subí el mismo Short en las 3 plataformas para maximizar alcance sin trabajo extra."],
    "retención|retention|algoritmo":["YouTube mide retención a los 30s, 50%, 70% y 100%. Más retención = más push del algoritmo. Meta mínima: 45% de retención promedio.","Las primeras 6 horas son críticas. YouTube testea el video con 200-500 personas. CTR > 4% + retención > 50% en las primeras 6h = push masivo automático."],
    "error|no funciona|api":["Si hay error de API, la app genera respuestas locales inteligentes automáticamente. Siempre vas a poder generar contenido.","Si el error persiste, recargá la página. La app funciona offline con respuestas pre-generadas adaptadas a tu tema."],
    "historial|anterior|guardado":["Tu historial se guarda en el dispositivo. Tocá '📂 Mis videos guardados' en el inicio para acceder a todos tus packs anteriores.","Podés revisar guiones, SEO y análisis de videos anteriores sin tener que regenerar."],
    "canva|diseño|miniatura como":["Para Canva: 1) Fondo negro puro, 2) Importá imagen de tema, 3) Texto en Impact o Bebas Neue, 4) Colores exactos que te da la app, 5) Tamaño 1280x720px.","La app te da el prompt de Midjourney para generar la imagen de fondo con IA, y las instrucciones exactas para Canva."],
  };

  function getBotResponse(msg){
    const ml=msg.toLowerCase();
    for(const[keys,responses]of Object.entries(knowledgeBase)){
      if(new RegExp(keys).test(ml))return responses[Math.floor(Math.random()*responses.length)];
    }
    if(/hola|buenas|hey/.test(ml))return "¡Hola! Estoy acá para ayudarte 💪 Preguntame sobre ganchos, miniaturas, CPM, guiones o cómo usar la app.";
    if(/gracias/.test(ml))return "¡De nada! Si necesitás más ayuda, estoy acá. 🚀";
    return "Buena pregunta. El éxito en YouTube viene de 3 cosas: miniatura con CTR >5%, gancho irresistible en los primeros 3 segundos, y Dato de Oro al final. ¿Sobre cuál querés profundizar?";
  }

  function send(){
    if(!input.trim()||loading)return;
    const txt=input.trim();
    setMsgs(p=>[...p,{t:"user",txt}]);
    setInput("");setLoading(true);
    setTimeout(()=>{
      setMsgs(p=>[...p,{t:"bot",txt:getBotResponse(txt)}]);
      setLoading(false);
    },700+Math.random()*500);
  }

  if(!visible)return null;
  return(
    <div className="chat-window animate-up">
      <div style={{padding:"12px 16px",borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center",background:C.surface}}>

          <div>
            <div style={{color:C.text,fontWeight:700,fontSize:13,fontFamily:"Syne"}}>Asistente ViralStudio</div>
            <div style={{color:C.green,fontSize:10,display:"flex",alignItems:"center",gap:4}}><span style={{display:"inline-block",width:6,height:6,borderRadius:"50%",background:C.green}}/>En línea</div>
          </div>
        </div>
        <button onClick={onClose} style={{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:20,padding:"0 4px"}}>✕</button>
      </div>
      <div className="chat-msgs">
        {msgs.map((m,i)=>(
          <div key={i} className={`chat-msg ${m.t}`} style={{whiteSpace:"pre-wrap"}}>{m.txt}</div>
        ))}
        {loading&&<div className="chat-msg bot" style={{opacity:.6}}>Escribiendo<span style={{animation:"pulse 1s infinite"}}>...</span></div>}
        <div ref={endRef}/>
      </div>
      <div className="chat-in-area">
        <input className="chat-in" value={input} onChange={e=>setInput(e.target.value)} onKeyPress={e=>e.key==="Enter"&&send()} placeholder="Preguntame lo que necesites..."/>
        <button className="chat-send" onClick={send}>➤</button>
      </div>
    </div>
  );
}

function S2_Investigate({cfg,onNext,onBack}){
  const [state,setState]=useState("idle");
  const [pct,setPct]=useState(0);
  const [msg,setMsg]=useState("");
  const [err,setErr]=useState("");
  const [rl,setRl]=useState(false);
  const pctRef=useRef({v:0,t:null});
  const tema=cfg.tema||cfg.catLabel;
  function animTo(target){
    clearInterval(pctRef.current.t);
    pctRef.current.t=setInterval(()=>{
      pctRef.current.v=Math.min(pctRef.current.v+1,target);
      setPct(pctRef.current.v);
      if(pctRef.current.v>=target)clearInterval(pctRef.current.t);
    },30);
  }
  async function run(){
    setState("loading");setErr("");setRl(false);
    pctRef.current.v=0;setPct(0);
    const steps=[[12,"🌐 Consultando fuentes online..."],[30,"📺 Localizando videos virales..."],[50,"🧠 Analizando psicología del contenido..."],[70,"🖼️ Estudiando miniatura y CTR..."],[88,"⚡ Generando ganchos magnéticos..."]];
    let mi=0;
    const tick=setInterval(()=>{if(mi<steps.length){animTo(steps[mi][0]);setMsg(steps[mi][1]);mi++;}},1200);
    const prompt=`TEMA: "${tema}" | Región: ${cfg.region} | Duración: ${cfg.dur}

Analiza este tema de YouTube. Devuelve SOLO JSON válido sin texto extra ni backticks:
{"viralScore":9.2,"oportunidad":"Oportunidad de Oro","oportunidadDesc":"2 frases específicas sobre por qué este tema es viral ahora","videoViral":{"titulo":"Título real de video viral del tema","canal":"Canal real","vistas":"Número real de vistas","porQueViral":["Razón psicológica","Razón de formato","Razón técnica"],"queryYT":"query exacto para YouTube","urlCanal":"nombre del canal"},"miniaturaOriginal":{"descripcion":"Descripción exacta de miniatura viral","psicologia":"Por qué funcionó neurológicamente","colores":"Colores exactos","contrasteCognitivo":"Tipo de contraste: Antes/Después, Escala Imposible, Elemento Chocante","tresPalabras":"MÁXIMO 3 PALABRAS EN MAYÚSCULAS","tuVersion":"Instrucciones exactas para recrear en español"},"ganchos":[{"texto":"Gancho 1 max 20 palabras","emocion":"emocion","porQueJala":"razón neurológica"},{"texto":"Gancho 2","emocion":"curiosidad","porQueJala":"razón"},{"texto":"Gancho 3","emocion":"asombro","porQueJala":"razón"}]}`;
    try{
      const raw=await callAI(prompt,1400);
      clearInterval(tick);animTo(100);setMsg("✅ Análisis completado!");
      let data=safeJSON(raw);
      if(!data){
        const raw2=await callAI(`Extrae SOLO el JSON de este texto:\n${raw.slice(0,800)}`,600);
        data=safeJSON(raw2);
      }
      if(!data){data=safeJSON(generateLocal(prompt));}
      setTimeout(()=>onNext(data),400);
    }catch(e){
      clearInterval(tick);setState("error");
      if(e.isRateLimit)setRl(true);else setErr(e.message||"Error desconocido");
    }
  }
  return(
    <div className="animate-up">
      <h2 style={{color:C.text,fontSize:18,fontWeight:900,marginBottom:4}}>Investigación con IA</h2>
      <p style={{color:C.muted,fontSize:12,marginBottom:14}}>Análisis real del tema + datos virales verificados</p>
      <Card style={{marginBottom:14}}>
        <div style={{color:C.muted,fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:.5,marginBottom:4}}>Investigando ahora</div>
        <div style={{color:C.purpleL,fontWeight:900,fontSize:16,fontFamily:"Syne"}}>"{tema}"</div>
        <div style={{display:"flex",gap:6,marginTop:8,flexWrap:"wrap"}}>
          <Tag color={C.muted}>{cfg.region}</Tag>
          <Tag color={C.muted}>{cfg.dur}</Tag>
          <Tag color={C.green}>🌐 IA Activa</Tag>
        </div>
      </Card>
      {rl&&<RateLimit onClose={()=>{setRl(false);setState("idle");}}/>}
      {state==="error"&&!rl&&(
        <Card style={{marginBottom:14,borderColor:"#7f1d1d",background:"#100303"}}>
          <div style={{color:"#fca5a5",fontWeight:800,marginBottom:6}}>❌ {err||"Error al procesar"}</div>
          <div style={{display:"flex",gap:8}}><Btn variant="ghost" onClick={onBack} small>← Atrás</Btn><Btn onClick={run} small>🔄 Reintentar</Btn></div>
        </Card>
      )}
      {state==="loading"&&(
        <Card glow={C.purple} style={{textAlign:"center",padding:"28px 16px"}}>
          <div style={{fontSize:40,marginBottom:14}}>🛰️</div>
          <div style={{color:C.purpleL,fontWeight:700,fontSize:14,marginBottom:16,minHeight:22}}>{msg}</div>
          <PBar pct={pct}/>
          <div style={{color:C.muted,fontSize:11,marginTop:8}}>{pct}% — ~15-25 segundos</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginTop:16}}>
            {[["🌐 Fuentes",pct>15],["📺 Video",pct>40],["🖼️ Miniatura",pct>65],["⚡ Ganchos",pct>=90]].map(([l,d])=>(
              <div key={l} style={{background:d?"#052e16":C.surface,borderRadius:7,padding:"7px 10px",display:"flex",alignItems:"center",gap:7}}>
                <span style={{color:d?C.green:C.muted,fontSize:13}}>{d?"✓":"○"}</span>
                <span style={{color:d?C.green:C.muted,fontSize:11}}>{l}</span>
              </div>
            ))}
          </div>
        </Card>
      )}
      {state==="idle"&&!rl&&(
        <>
          <Card style={{marginBottom:14}}>
            <div style={{color:C.text,fontWeight:800,fontSize:13,marginBottom:10,fontFamily:"Syne"}}>🛰️ La IA va a encontrar:</div>
            {[["🌐","Video viral real de referencia con datos verificados"],["📊","Canal, vistas y factores de éxito analizados"],["🖼️","Fórmula exacta de miniatura + Contraste Cognitivo"],["⚡","3 ganchos con explicación neurológica"],["📡","Radar viral + Espía de competencia"]].map(([i,t])=>(
              <div key={t} style={{display:"flex",gap:10,marginBottom:8,alignItems:"flex-start"}}>
                <span style={{fontSize:16,flexShrink:0}}>{i}</span>
                <span style={{color:C.sub,fontSize:12,lineHeight:1.5}}>{t}</span>
              </div>
            ))}
          </Card>
          <div style={{display:"flex",gap:10}}>
            <Btn variant="ghost" onClick={onBack}>← Cambiar</Btn>
            <Btn full onClick={run}>🛰️ Analizar con IA →</Btn>
          </div>
        </>
      )}
    </div>
  );
}

function S4_Generate({cfg,research,gancho,onNext,onBack}){
  const [pct,setPct]=useState(0);
  const [msg,setMsg]=useState("");
  const [running,setRun]=useState(false);
  const [rl,setRl]=useState(false);
  const pctRef=useRef({v:0,t:null});
  function animTo(target){
    clearInterval(pctRef.current.t);
    pctRef.current.t=setInterval(()=>{
      pctRef.current.v=Math.min(pctRef.current.v+1,target);
      setPct(pctRef.current.v);
      if(pctRef.current.v>=target)clearInterval(pctRef.current.t);
    },20);
  }
  async function run(){
    setRun(true);setRl(false);
    setMsg("🧠 Generando pack completo...");animTo(18);
    const fakeAnim=setInterval(()=>animTo(Math.min((pctRef.current.v||0)+2,88)),1500);
    const tema=cfg.tema||cfg.catLabel;
    const prompt=`TEMA: "${tema}" | Región: ${cfg.region} | Duración: ${cfg.dur}
GANCHO: "${gancho.texto}" | Emoción: ${gancho.emocion}
VIDEO REF: "${research.videoViral?.titulo}" de ${research.videoViral?.canal}

Genera 4 bloques separados EXACTAMENTE por ||| sin texto previo:

BLOQUE 1 — GUION COMPLETO (español neutro, mínimo 5 escenas):
[MM:SS] ESCENA N — NOMBRE
NARRADOR: texto conversacional exacto
VISUAL: toma específica con técnica de cámara
MÚSICA: ambiente y ritmo exacto
TEXTO EN PANTALLA: MAYÚSCULAS máx 5 palabras
EMOCIÓN OBJETIVO: qué siente el viewer
Incluir: [0-3s] gancho visual, [3-10s] promesa, escenas de desarrollo, 🏆 DATO DE ORO [escena final]

|||

BLOQUE 2 — 3 SHORTS + PROMPT INVIDEO:
SHORT #N: [Título] | [0-3s] gancho →CORTE→ | [3-42s] desarrollo →CORTE→ cada 3s | [42-50s] 🏆 DATO DE ORO | CTA
---
PROMPT INVIDEO AI (inglés, pegar directo):
Descripción completa del estilo visual, ritmo, música, colores.

|||

BLOQUE 3 — PLAN DE RETENCIÓN:
SEGUNDO A SEGUNDO 0-30s: [Xs]: visual + audio + razón psicológica
MINUTO A MINUTO: elemento de retención + trampa de salida
DATO DE ORO: momento exacto + 3 frases crípticas + revelación
METAS: CTR objetivo, retención, engagement

|||

BLOQUE 4 — SEO + IDEAS:
TÍTULO PRINCIPAL (≤60 chars)
5 TÍTULOS A/B TEST
DESCRIPCIÓN YT: gancho + promesa + keywords + timestamps + hashtags
15 TAGS por volumen
Mejor día y hora para ${cfg.region}
PROMPT MIDJOURNEY para miniatura (inglés)
10 IDEAS SEMANALES: 💡N: [Título] | 🎣[Hook] | 📊[X/10] | 💰[CPM] | ⏰[hora]
Marcar 🥇🥈🥉 TOP 3`;
    try{
      const raw=await callAI(prompt,1400);
      clearInterval(fakeAnim);
      const parts=raw.split("|||");
      // Use local generators as fallback for missing parts
      const guion=parts[0]?.trim()||generateScript(cfg,research,gancho);

            saveHistory({tema:cfg.tema,region:cfg.region,dur:cfg.dur,viralScore:research.viralScore,oportunidad:research.oportunidad,date:new Date().toISOString()});
            setStep(4);
          }} onBack={()=>setStep(2)}/>}
          {step===4&&content&&<S5_Result cfg={cfg} research={research} gancho={gancho} content={content} onRestart={resetWizard}/>}
        </>
      )}

      {/* FLOATING CHAT */}
      <div className="chat-bubble" onClick={()=>setChatOpen(!chatOpen)}>
        {chatOpen?"✕":"🤖"}
      </div>
      <ChatAssistant visible={chatOpen} onClose={()=>setChatOpen(false)}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
